<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .title {
            font-size: 60px;
            font-weight: bold;
            color: #f9f6f2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .score-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 10px 15px;
            text-align: center;
            min-width: 80px;
        }

        .score-label {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            font-weight: bold;
        }

        .score-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        .subtitle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .new-game-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .new-game-btn:hover {
            background: #9f8b77;
        }

        .message {
            font-size: 18px;
            font-weight: bold;
            color: #f9f6f2;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .game-board {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .tile {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            transition: all 0.15s ease;
            position: relative;
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; }
        .tile-256 { background: #edcc61; color: #f9f6f2; }
        .tile-512 { background: #edc850; color: #f9f6f2; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; }

        .tile-new {
            animation: appear 0.2s ease;
        }

        .tile-merged {
            animation: pop 0.2s ease;
        }

        @keyframes appear {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .instructions {
            margin-top: 20px;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .game-over-content {
            background: #f9f6f2;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }

        .game-over-title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-over-score {
            font-size: 24px;
            color: #776e65;
            margin-bottom: 25px;
        }

        .game-over-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            border-radius: 6px;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .game-over-btn:hover {
            background: #9f8b77;
        }

        .win-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(237, 198, 46, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .win-content {
            text-align: center;
        }

        .win-title {
            font-size: 48px;
            font-weight: bold;
            color: #f9f6f2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .win-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            border-radius: 6px;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-right: 10px;
        }

        .win-btn:hover {
            background: #9f8b77;
        }

        .win-btn.keep-playing {
            background: #edc22e;
            color: #776e65;
        }

        .win-btn.keep-playing:hover {
            background: #edc53f;
        }

        @media (max-width: 480px) {
            .title {
                font-size: 45px;
            }

            .tile {
                font-size: 24px;
            }

            .game-board {
                padding: 10px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">2048</div>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Best</div>
                    <div class="score-value" id="best">0</div>
                </div>
            </div>
        </div>
        
        <div class="subtitle">
            <button class="new-game-btn" id="new-game">New Game</button>
            <div class="message" id="message"></div>
        </div>
        
        <div class="game-board" id="game-board">
            <div class="tile" data-row="0" data-col="0"></div>
            <div class="tile" data-row="0" data-col="1"></div>
            <div class="tile" data-row="0" data-col="2"></div>
            <div class="tile" data-row="0" data-col="3"></div>
            <div class="tile" data-row="1" data-col="0"></div>
            <div class="tile" data-row="1" data-col="1"></div>
            <div class="tile" data-row="1" data-col="2"></div>
            <div class="tile" data-row="1" data-col="3"></div>
            <div class="tile" data-row="2" data-col="0"></div>
            <div class="tile" data-row="2" data-col="1"></div>
            <div class="tile" data-row="2" data-col="2"></div>
            <div class="tile" data-row="2" data-col="3"></div>
            <div class="tile" data-row="3" data-col="0"></div>
            <div class="tile" data-row="3" data-col="1"></div>
            <div class="tile" data-row="3" data-col="2"></div>
            <div class="tile" data-row="3" data-col="3"></div>
        </div>
        
        <div class="instructions">
            使用方向键 ↑↓←→ 或滑动屏幕移动方块<br>
            相同数字碰撞时合并，达到 2048 即可获胜！
        </div>
    </div>
    
    <div class="game-over-overlay" id="game-over-overlay">
        <div class="game-over-content">
            <div class="game-over-title">Game Over!</div>
            <div class="game-over-score">最终得分: <span id="final-score">0</span></div>
            <button class="game-over-btn" id="restart-btn">再来一局</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 4;
        let grid = [];
        let score = 0;
        let bestScore = 0;
        let hasWon = false;
        let gameOver = false;

        function initGrid() {
            grid = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                grid.push([0, 0, 0, 0]);
            }
        }

        function getEmptyCells() {
            const emptyCells = [];
            for (let row = 0; row < GRID_SIZE; row++) {
                for (let col = 0; col < GRID_SIZE; col++) {
                    if (grid[row][col] === 0) {
                        emptyCells.push({ row, col });
                    }
                }
            }
            return emptyCells;
        }

        function addRandomTile() {
            const emptyCells = getEmptyCells();
            if (emptyCells.length === 0) return false;
            
            const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            const value = Math.random() < 0.9 ? 2 : 4;
            grid[randomCell.row][randomCell.col] = value;
            
            const tile = document.querySelector(`[data-row="${randomCell.row}"][data-col="${randomCell.col}"]`);
            tile.textContent = value;
            tile.className = `tile tile-${value} tile-new`;
            
            setTimeout(() => {
                tile.classList.remove('tile-new');
            }, 200);
            
            return true;
        }

        function updateScore(newScore) {
            score += newScore;
            document.getElementById('score').textContent = score;
            
            if (score > bestScore) {
                bestScore = score;
                document.getElementById('best').textContent = bestScore;
                localStorage.setItem('2048-best', bestScore.toString());
            }
        }

        function renderGrid() {
            for (let row = 0; row < GRID_SIZE; row++) {
                for (let col = 0; col < GRID_SIZE; col++) {
                    const tile = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                    const value = grid[row][col];
                    
                    if (value === 0) {
                        tile.textContent = '';
                        tile.className = 'tile';
                    } else {
                        tile.textContent = value;
                        tile.className = `tile tile-${value}`;
                    }
                }
            }
        }

        function slideRowLeft(row) {
            let arr = row.filter(x => x !== 0);
            let merged = [];
            let scoreGain = 0;
            
            for (let i = 0; i < arr.length; i++) {
                if (i < arr.length - 1 && arr[i] === arr[i + 1]) {
                    const newValue = arr[i] * 2;
                    merged.push(newValue);
                    scoreGain += newValue;
                    i++;
                } else {
                    merged.push(arr[i]);
                }
            }
            
            while (merged.length < GRID_SIZE) {
                merged.push(0);
            }
            
            return { row: merged, scoreGain, moved: JSON.stringify(row) !== JSON.stringify(merged) };
        }

        function move(direction) {
            if (gameOver) return false;
            
            let moved = false;
            let totalScoreGain = 0;
            
            if (direction === 'left') {
                for (let i = 0; i < GRID_SIZE; i++) {
                    const result = slideRowLeft(grid[i]);
                    grid[i] = result.row;
                    totalScoreGain += result.scoreGain;
                    if (result.moved) moved = true;
                }
            } else if (direction === 'right') {
                for (let i = 0; i < GRID_SIZE; i++) {
                    const reversedRow = [...grid[i]].reverse();
                    const result = slideRowLeft(reversedRow);
                    grid[i] = result.row.reverse();
                    totalScoreGain += result.scoreGain;
                    if (result.moved) moved = true;
                }
            } else if (direction === 'up') {
                for (let j = 0; j < GRID_SIZE; j++) {
                    const col = [];
                    for (let i = 0; i < GRID_SIZE; i++) {
                        col.push(grid[i][j]);
                    }
                    const result = slideRowLeft(col);
                    for (let i = 0; i < GRID_SIZE; i++) {
                        grid[i][j] = result.row[i];
                    }
                    totalScoreGain += result.scoreGain;
                    if (result.moved) moved = true;
                }
            } else if (direction === 'down') {
                for (let j = 0; j < GRID_SIZE; j++) {
                    const col = [];
                    for (let i = GRID_SIZE - 1; i >= 0; i--) {
                        col.push(grid[i][j]);
                    }
                    const result = slideRowLeft(col);
                    const reversedResult = result.row.reverse();
                    for (let i = 0; i < GRID_SIZE; i++) {
                        grid[i][j] = reversedResult[i];
                    }
                    totalScoreGain += result.scoreGain;
                    if (result.moved) moved = true;
                }
            }
            
            if (moved) {
                updateScore(totalScoreGain);
                renderGrid();
                
                setTimeout(() => {
                    addRandomTile();
                    checkGameState();
                }, 100);
            }
            
            return moved;
        }

        function canMove() {
            for (let row = 0; row < GRID_SIZE; row++) {
                for (let col = 0; col < GRID_SIZE; col++) {
                    if (grid[row][col] === 0) return true;
                    
                    if (col < GRID_SIZE - 1 && grid[row][col] === grid[row][col + 1]) return true;
                    if (row < GRID_SIZE - 1 && grid[row][col] === grid[row + 1][col]) return true;
                }
            }
            return false;
        }

        function hasWonTile() {
            for (let row = 0; row < GRID_SIZE; row++) {
                for (let col = 0; col < GRID_SIZE; col++) {
                    if (grid[row][col] >= 2048) return true;
                }
            }
            return false;
        }

        function checkGameState() {
            if (!hasWon && hasWonTile()) {
                hasWon = true;
                document.getElementById('message').textContent = '🎉 You Win!';
            }
            
            if (!canMove()) {
                gameOver = true;
                document.getElementById('final-score').textContent = score;
                document.getElementById('game-over-overlay').style.display = 'flex';
            }
        }

        function startNewGame() {
            initGrid();
            score = 0;
            hasWon = false;
            gameOver = false;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('message').textContent = '';
            document.getElementById('game-over-overlay').style.display = 'none';
            
            renderGrid();
            addRandomTile();
            addRandomTile();
        }

        function handleKeyDown(e) {
            const keyMap = {
                ArrowUp: 'up',
                ArrowDown: 'down',
                ArrowLeft: 'left',
                ArrowRight: 'right',
                KeyW: 'up',
                KeyS: 'down',
                KeyA: 'left',
                KeyD: 'right'
            };
            
            const direction = keyMap[e.code];
            if (direction) {
                e.preventDefault();
                move(direction);
            }
        }

        let touchStartX = 0;
        let touchStartY = 0;

        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }

        function handleTouchEnd(e) {
            if (gameOver) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            const minSwipeDistance = 30;
            
            if (Math.abs(deltaX) < minSwipeDistance && Math.abs(deltaY) < minSwipeDistance) return;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                move(deltaX > 0 ? 'right' : 'left');
            } else {
                move(deltaY > 0 ? 'down' : 'up');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedBest = localStorage.getItem('2048-best');
            if (savedBest) {
                bestScore = parseInt(savedBest);
                document.getElementById('best').textContent = bestScore;
            }
            
            startNewGame();
            
            document.getElementById('new-game').addEventListener('click', startNewGame);
            document.getElementById('restart-btn').addEventListener('click', startNewGame);
            
            document.addEventListener('keydown', handleKeyDown);
            
            const gameBoard = document.getElementById('game-board');
            gameBoard.addEventListener('touchstart', handleTouchStart, { passive: true });
            gameBoard.addEventListener('touchend', handleTouchEnd);
        });
    </script>
</body>
</html>
